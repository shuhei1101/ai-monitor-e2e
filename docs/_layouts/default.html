<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
  <!-- Mermaid はダーク/ライトの切り替えに追従させるため app.js から初期化する（自動 start はしない） -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="{{ '/assets/app.js' | relative_url }}" defer></script>
</head>
<body
  data-site-root="{{ '/' | relative_url }}"
  data-raw-base="https://raw.githubusercontent.com/{{ site.repository.owner }}/{{ site.repository.name }}/{{ site.repository.branch }}/docs"
  data-page-path="{{ page.path }}"
  data-search-index="{{ '/search.json' | relative_url }}"
>
  <header class="topbar">
    <div class="brand"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></div>
    <div class="topbar-search">
      <input type="search" data-search-input placeholder="全ページ検索（title / path / 本文）...">
      <ul class="search-results" data-search-results hidden></ul>
    </div>
    <div class="topbar-actions">
      <button type="button" class="theme-toggle" data-theme-toggle title="テーマ切替" aria-label="テーマ切替">🌓</button>
      <a class="md-download" data-md-download href="#" title="この Markdown ファイルの raw を開く">MD</a>
    </div>
  </header>
  <main class="main-with-toc">
    <div class="main-content">
      <nav class="breadcrumb" data-breadcrumb></nav>
      <article class="markdown-body">
        {{ content }}
      </article>
    </div>
    <aside class="toc" data-toc hidden>
      <div class="toc-title">目次</div>
      <ul class="toc-list" data-toc-list></ul>
    </aside>
    <button class="back-to-top" data-back-to-top aria-label="トップへ戻る">↑</button>
  </main>
</body>
</html>
