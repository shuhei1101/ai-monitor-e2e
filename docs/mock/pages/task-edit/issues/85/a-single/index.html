<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タスク編集 - 案 a-single</title>
  <link rel="stylesheet" href="../../../../../../assets/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">my-plugins mock</div>
  </header>
  <main class="main">
    <p class="breadcrumb"><a href="../">案リスト</a> &gt; <span>a-single</span></p>
    <div class="page-header">
      <h1>タスク編集</h1>
      <div class="actions">
        <button class="ghost" onclick="location.href='../../../../task-list/issues/85/a-single/index.html'">キャンセル</button>
        <button class="primary" onclick="location.href='../../../../task-list/issues/85/a-single/index.html'">保存</button>
      </div>
    </div>
    <p class="hint">既存 API を利用し、保存 / キャンセルはいずれもタスク一覧へ戻る。</p>

    <section class="card">
      <div class="field-row"><span class="field-label">ID</span><span class="field-value"><input type="text" value="T-1001" readonly></span></div>
      <div class="field-row"><span class="field-label">タイトル</span><span class="field-value"><input type="text" value="要件定義レビュー"></span></div>
      <div class="field-row"><span class="field-label">担当</span><span class="field-value"><input type="text" value="山田 太郎"></span></div>
      <div class="field-row"><span class="field-label">期限</span><span class="field-value"><input type="text" value="2026-07-25"></span></div>
      <div class="field-row"><span class="field-label">状態</span><span class="field-value"><input type="text" value="対応中"></span></div>
      <div class="field-row"><span class="field-label">メモ</span><span class="field-value"><textarea rows="4">レビュー観点をまとめてから会議招集。</textarea></span></div>
    </section>
  </main>
  <div class="toast" id="toast" hidden></div>
  <script src="../../../../../../assets/app.js"></script>
</body>
</html>
