# GitHub Pages 用 Jekyll 設定
# docs/ 配下を Jekyll サイトとしてビルドする

title: my-plugins
description: プラグイン開発リポジトリの Wiki + モック

# GitHub Pages のプロジェクトサイトはリポジトリ名がパスプレフィクスになる
# 例: https://shuhei1101.github.io/my-plugins/ で配信されるので baseurl を明示
# これにより {{ '/' | relative_url }} が "/my-plugins/" を返し、
# トップ / パンくずの リンクが 404 にならなくなる
baseurl: /my-plugins

# MD ダウンロードボタン用に raw.githubusercontent.com のパスを組み立てる
repository:
  owner: shuhei1101
  name: my-plugins
  branch: master

# Markdown 処理（kramdown + GFM 互換）
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# GitHub Pages 標準プラグイン
# - jekyll-optional-front-matter: front matter を持たない .md も Jekyll が処理する
#   （全 MD に "---\nlayout: default\n---" を書かなくて済む）
# - jekyll-readme-index: README.md をディレクトリのインデックス扱いにする
#   （フォルダ URL を開くと README.md が描画される）
# - jekyll-relative-links: [foo](foo.md) を [foo](foo.html) 相当に自動書き換え
plugins:
  - jekyll-optional-front-matter
  - jekyll-readme-index
  - jekyll-relative-links

# 全ページのデフォルト layout を default にする
# 個別 MD に front matter を書かなくても _layouts/default.html が適用される
defaults:
  - scope:
      path: ""
    values:
      layout: default

# jekyll-optional-front-matter を全ファイルに適用する
optional_front_matter:
  remove_originals: true

# jekyll-readme-index に README.md をディレクトリインデックスとして扱わせる
readme_index:
  enabled: true
  remove_originals: true
  with_frontmatter: true

# jekyll-relative-links の設定
relative_links:
  enabled: true
  collections: true

# ビルドから除外するもの
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
