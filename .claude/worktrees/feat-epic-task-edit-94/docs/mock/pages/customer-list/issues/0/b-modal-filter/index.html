<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>顧客一覧 - 案 B: フィルターモーダル</title>
  <link rel="stylesheet" href="../../../../../../assets/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">my-plugins mock</div>
</header>
  <main class="main">
    <p class="breadcrumb"><a href="../">案リスト</a> &gt; <span>案 B</span></p>
    <div class="page-header">
      <h1>顧客一覧</h1>
      <div class="actions">
        <input type="search" id="search" placeholder="検索...">
        <button class="ghost" id="filter-btn">フィルター</button>
        <button class="primary" id="new-btn">新規追加</button>
      </div>
    </div>
    <p class="hint">適用中: 業種=製造, 状態=取引中</p>
    <table class="data-table" id="customer-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>顧客名</th>
          <th>業種</th>
          <th>担当</th>
          <th>状態</th>
        </tr>
      </thead>
      <tbody>
        <tr data-id="1001"><td>C-1001</td><td>株式会社アルファ</td><td>製造</td><td>山田 太郎</td><td><span class="badge ok">取引中</span></td></tr>
        <tr data-id="1003"><td>C-1003</td><td>ガンマ商事</td><td>卸売</td><td>鈴木 一郎</td><td><span class="badge ok">取引中</span></td></tr>
        <tr data-id="1005"><td>C-1005</td><td>イプシロン物流</td><td>運輸</td><td>田中 健</td><td><span class="badge ok">取引中</span></td></tr>
      </tbody>
    </table>
    <div class="pager">
      <button class="ghost">前へ</button>
      <span>1 / 8</span>
      <button class="ghost">次へ</button>
    </div>
  </main>
  <div class="toast" id="toast" hidden></div>
  <script src="../../../../../../assets/app.js"></script>
</body>
</html>
