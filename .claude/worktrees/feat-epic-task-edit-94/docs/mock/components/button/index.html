<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ボタン - カタログ</title>
  <link rel="stylesheet" href="../../../assets/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">my-plugins mock</div>
</header>
  <main class="main">
    <p class="breadcrumb"><a href="../">コンポーネント</a> &gt; <span>ボタン</span></p>
    <div class="page-header"><h1>ボタン</h1></div>
    <p class="hint">種類・状態・並び順のサンプル。</p>

    <section class="card">
      <h2>種類</h2>
      <div class="actions">
        <button class="primary">プライマリ</button>
        <button class="ghost">ゴースト</button>
        <button class="danger">危険</button>
      </div>
    </section>

    <section class="card">
      <h2>無効状態</h2>
      <div class="actions">
        <button class="primary" disabled>プライマリ（無効）</button>
        <button class="ghost" disabled>ゴースト（無効）</button>
      </div>
    </section>

    <section class="card">
      <h2>並び方（業務系の標準: キャンセル左、確定右）</h2>
      <div class="actions" style="justify-content: flex-end;">
        <button class="ghost">キャンセル</button>
        <button class="primary">保存</button>
      </div>
    </section>
  </main>
</body>
</html>
